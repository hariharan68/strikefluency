<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StrikeFluency — Virtual Options Trading</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23335cff'/><text y='.9em' font-size='80' x='10'>SF</text></svg>" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Apply the saved theme before React paints to avoid a palette flash.
      (function () {
        var t = localStorage.getItem('sf-theme') || 'dark';
        if (t !== 'dark' && t !== 'light' && t !== 'forest-light') t = 'dark';
        document.documentElement.classList.add(t);
        document.documentElement.dataset.theme = t;
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
