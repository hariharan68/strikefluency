# alembic.ini
# ──────────────────────────────────────────────────
# Alembic configuration for StrikeFluency
# The DATABASE_URL is overridden by migrations/env.py
# which reads it from .env — so the sqlalchemy.url
# line below is just a placeholder.
# ──────────────────────────────────────────────────

[alembic]
script_location = migrations
prepend_sys_path = .
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
truncate_slug_length = 40

# Overridden in migrations/env.py — do not put real creds here
sqlalchemy.url = postgresql://placeholder/placeholder

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S